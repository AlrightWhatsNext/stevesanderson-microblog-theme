<!-- Scroll-spy: highlight the nav link for the homepage section in view.
     Uses "last section past a line near the top, plus a bottom-of-page catch" so the final
     section (Engage / Talk) reliably activates even though it can't reach the viewport center.
     No-op on pages without these sections (post / blog), where the server-side .active stands. -->
<script type="text/javascript">
(function(){
  var links = Array.prototype.slice.call(document.querySelectorAll('nav .links a'));
  var map = {};
  links.forEach(function(a){
    var h = a.getAttribute('href') || '';
    var i = h.indexOf('#');
    if (i >= 0) { var id = h.slice(i + 1); if (id) map[id] = a; }
  });
  var sections = Object.keys(map).map(function(id){ return document.getElementById(id); }).filter(Boolean);
  if (!sections.length) return; // post/blog pages keep the server-side .active
  sections.sort(function(a, b){ return a.offsetTop - b.offsetTop; });

  function activate(a){
    links.forEach(function(x){ x.classList.remove('active'); });
    if (a) a.classList.add('active');
  }

  // Immediate feedback on click, held through the smooth-scroll settle so the anchor jump
  // (which may not land the section at the top or the true page bottom) can't un-highlight it.
  var lockUntil = 0;
  links.forEach(function(a){
    if ((a.getAttribute('href') || '').indexOf('#') < 0) return;
    a.addEventListener('click', function(){ activate(a); lockUntil = Date.now() + 900; });
  });

  function update(){
    if (Date.now() < lockUntil) return;
    var line = window.innerHeight * 0.35;
    var current = null;
    for (var i = 0; i < sections.length; i++){
      if (sections[i].getBoundingClientRect().top <= line) current = sections[i];
    }
    if ((window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 2)) {
      current = sections[sections.length - 1]; // at page bottom, force the last section
    }
    activate(current ? map[current.id] : null);
  }
  var ticking = false;
  function onScroll(){ if (!ticking){ ticking = true; window.requestAnimationFrame(function(){ update(); ticking = false; }); } }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll);
  update();
})();
</script>

<!-- Mobile nav toggle (hamburger) -->
<script type="text/javascript">
(function(){
  var toggle = document.querySelector('.nav-toggle');
  var links = document.getElementById('nav-links');
  if (!toggle || !links) return;
  toggle.addEventListener('click', function(){
    var open = links.classList.toggle('open');
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  Array.prototype.slice.call(links.querySelectorAll('a')).forEach(function(a){
    a.addEventListener('click', function(){ links.classList.remove('open'); toggle.setAttribute('aria-expanded', 'false'); });
  });
})();
</script>
