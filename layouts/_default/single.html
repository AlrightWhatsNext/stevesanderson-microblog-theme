{{ define "main" }}
<article class="post">
  {{ if .Title }}<h1>{{ .Title }}</h1>{{ end }}
  <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
  <div class="post-content">
    {{ .Content }}
  </div>
  <p class="back"><a href="{{ .Site.BaseURL }}">← Home</a></p>
</article>
{{ end }}
