{{ define "main" }}
<section class="list">
  <h1>{{ .Title | default "Posts" }}</h1>
  <ul class="post-list">
  {{ range .Pages }}
    {{ if .Title }}
    <li>
      <a href="{{ .Permalink }}">{{ .Title }}</a>
      <small>{{ .Date.Format "Jan 2, 2006" }}</small>
    </li>
    {{ end }}
  {{ end }}
  </ul>
</section>
{{ end }}
