<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}Steve Sanderson - Product Operating Model coaching{{ else }}{{ with .Title }}{{ . }} - {{ end }}{{ .Site.Title }}{{ end }}</title>
  {{ partial "head.html" . }}
</head>
<body>

<nav>
  <div class="wrap">
    <a class="name" href="/">{{ .Site.Title | default "Steve Sanderson" }}</a>
    <button type="button" class="nav-toggle" aria-label="Menu" aria-expanded="false" aria-controls="nav-links">&#9776;</button>
    <div class="links" id="nav-links">
      <a href="/#who">Who it's for</a>
      <a href="/#possible">What's possible</a>
      <a href="/#bring">What I bring</a>
      <a href="/#help">How I help</a>
      <a href="/#work">How I work</a>
      <a href="/#insights"{{ if or (eq .Type "post") (eq .Type "blog") }} class="active"{{ end }}>Insights</a>
      <a href="/#engage">Let's Talk</a>
    </div>
  </div>
</nav>

{{ block "main" . }}{{ end }}

<footer>
  <div class="wrap">
    <div>© {{ .Site.Title | default "Steve Sanderson" }} · stevesanderson.com</div>
    <div></div>
  </div>
</footer>

{{ partial "custom_footer.html" . }}
</body>
</html>
