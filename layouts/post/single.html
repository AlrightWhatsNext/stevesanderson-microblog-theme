{{ define "main" }}
<article class="wrap text" style="padding:52px 28px 72px;">
  <p style="margin:0 0 22px;"><a href="/blog">← Writing</a></p>
  {{ if .Title }}<h1 style="font-size:32px;margin:0 0 8px;">{{ .Title }}</h1>{{ end }}
  <p style="color:var(--muted);font-size:14px;margin:0 0 30px;">{{ .Date.Format "Jan 2, 2006" }}</p>
  <div class="post-content">
    {{ .Content }}
  </div>
  <p style="margin-top:48px;border-top:1px solid var(--line);padding-top:24px;">
    <a href="/blog">← Back to writing</a> &nbsp;·&nbsp; <a href="/">Home</a>
  </p>
</article>
{{ end }}
